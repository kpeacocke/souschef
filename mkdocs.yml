site_name: SousChef Documentation
site_description: AI-powered MCP server for multi-platform to Ansible migration and Ansible upgrade planning
site_author: SousChef Contributors
# site_url: https://kpeacocke.github.io/souschef/  # Commented out for local dev

repo_name: kpeacocke/souschef
repo_url: https://github.com/kpeacocke/souschef
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode - Charcoal + Teal
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode - Charcoal + Teal
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: en
  - git-revision-date-localized:
      enable_creation_date: false
      enable_git_follow: false
      fallback_to_build_date: true
      type: timeago
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            group_by_category: true
            show_signature_annotations: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: "#"
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Configuration: getting-started/configuration.md
  - User Guide:
      - MCP Tools: user-guide/mcp-tools.md
      - CLI Usage: user-guide/cli-usage.md
      - UI: user-guide/ui.md
      - Ansible Upgrades: user-guide/ansible-upgrades.md
      - Performance: user-guide/performance.md
      - Terraform Provider: user-guide/terraform-provider.md
      - Examples: user-guide/examples.md
      - Data Persistence: user-guide/data-persistence.md
      - Troubleshooting: user-guide/troubleshooting.md
  - Migration Guide:
      - Overview: migration-guide/overview.md
      - SaltStack Migration: migration-guide/salt-migration.md
      - Bash Migration: migration-guide/bash-migration.md
      - PowerShell Migration: migration-guide/powershell-migration.md
      - Puppet Migration: migration-guide/puppet-migration.md
      - Assessment: migration-guide/assessment.md
      - Conversion: migration-guide/conversion.md
      - Safety and Validation: migration-guide/safety-and-validation.md
      - Detailed Planning: migration-guide/detailed-planning.md
      - Deployment: migration-guide/deployment.md
      - Advanced Workflows: migration-guide/advanced-workflows.md
  - API Reference:
      - Server: api-reference/server.md
      - CLI: api-reference/cli.md
      - Parsers: api-reference/parsers.md
      - Converters: api-reference/converters.md
      - Core Utilities: api-reference/core.md
      - Migration v2.0: api-reference/migration-v2.md
      - Ansible Upgrade Design: reference/ansible-upgrade-design.md
  - Security:
      - Security Overview: SECURITY.md
      - Security Anti-Patterns: SECURITY_ANTI_PATTERNS.md
      - Security Headers Deployment: SECURITY_HEADERS_DEPLOYMENT.md
  - Testing:
      - Chef Server Testing: testing/CHEF_SERVER_TESTING.md
      - Mock AWX: testing/MOCK_AWX.md
      - Mock Chef Server: testing/MOCK_CHEF_SERVER.md
      - Mock IR Workflow: testing/MOCK_IR_WORKFLOW.md
  - Operations:
      - Docker Deployment: docker-deployment.md
      - Docker Setup: docker-setup.md
      - IR Reference: IR.md
      - SonarCloud Phase 1 Extension: SONARCLOUD_PHASE1_EXTENSION.md
  - Contributing:
